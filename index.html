<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Logory — A new logo library</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

html,body{margin:0;padding:0}
.lg-root{
  /* 컬러: 기존에 잡아둔 톤 유지 */
  --bg-top:#F7F6F3; --bg-bottom:#FFFFFF;
  --surface:#ffffff; --fill:#F9FAFB; --fill-line:#ECEAE4;
  --ink:#15171A; --ink-2:#5B6166; --ink-3:#9AA0A6;
  --line:#E7E5DF; --accent:#1B4DFF;
  --sans:'Pretendard','Pretendard Variable',-apple-system,BlinkMacSystemFont,sans-serif;
  --display:'Helvetica Neue',Helvetica,Arial,'Pretendard',sans-serif;
  --side:24px; /* 데스크톱 좌우 여백 */
  background:#F9FAFB;
  color:var(--ink); font-family:var(--sans); min-height:100vh;
  -webkit-font-smoothing:antialiased; letter-spacing:-0.01em;
}
*{box-sizing:border-box}
.lg-wrap{max-width:1200px;margin:0 auto;padding-left:var(--side);padding-right:var(--side)}
button{font-family:inherit}

/* ===== GNB ===== */
.lg-gnb{position:sticky;top:0;z-index:40;backdrop-filter:blur(8px);background:rgba(255,255,255,.7);border-bottom:1px solid rgba(105,117,134,.08)}
.lg-gnb-in{display:flex;align-items:center;justify-content:space-between;height:60px;gap:10px}
.lg-brand{display:flex;align-items:center;gap:8px;background:none;border:0;cursor:pointer;padding:0}
.lg-mark{width:18px;height:18px;flex:none}
.lg-logotype{font-family:var(--display);font-weight:700;font-size:22px;letter-spacing:1.1px;color:var(--ink)}
.lg-gnb-right{display:flex;align-items:center;gap:8px}
.lg-tabs{display:flex;align-items:center;gap:4px;background:#F9FAFB;border:1px solid var(--line);border-radius:14px;padding:4px}
.lg-tab{border:0;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--ink-2);padding:6px 14px;border-radius:12px}
.lg-tab.on{background:var(--surface);border:1px solid var(--line);box-shadow:0 1px 1px rgba(0,0,0,.04),0 2px 2px rgba(0,0,0,.04)}
.lg-upload{display:flex;align-items:center;justify-content:center;height:38px;padding:0 14px;border:0;border-radius:12px;background:var(--ink);color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.lg-upload:hover{filter:brightness(1.04);transform:translateY(-1px);box-shadow:0 6px 14px -10px rgba(0,0,0,.28)}
.lg-upload .short{display:none}

/* ===== Hero ===== */
.lg-hero{padding:56px var(--side) 28px;text-align:center}
.lg-hero-title{font-family:var(--display);font-weight:500;font-size:20px;color:var(--ink);margin:0}
.lg-search{position:relative;display:flex;align-items:center;gap:8px;width:360px;max-width:100%;margin:24px auto 0;background:var(--surface);border:1px solid var(--line);border-radius:8px;height:46px;padding:0 14px;transition:border-color .15s,box-shadow .15s}
.lg-search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(27,77,255,.12)}
.lg-search-ic{width:20px;height:20px;flex:none;color:var(--ink)}
.lg-search input{flex:1;min-width:0;border:0;outline:0;background:none;font-size:14px;font-family:var(--sans);color:var(--ink);letter-spacing:-0.3px}
.lg-search input::placeholder{color:var(--ink-3)}
.lg-search-clear{border:0;background:#EFEDE7;color:var(--ink-2);width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:15px;line-height:1;flex:none}

/* ===== Filters ===== */
.lg-filters{display:flex;flex-direction:column;align-items:center;gap:20px;margin-top:20px}
.lg-chiprow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:100%}
.lg-chip{flex:none;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:8px;padding:6px 12px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:.13s}
.lg-chip:hover{border-color:#cdcbc4}
.lg-chip.on{border-color:var(--ink)}
.lg-colors{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap}
.lg-color{display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:6px;cursor:pointer;transition:.13s}
.lg-color-sw{width:20px;height:20px;border-radius:50%;background:var(--sw);box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}
.lg-color.on{border-color:var(--ink)}
.lg-color.on .lg-color-sw{box-shadow:inset 0 0 0 1px rgba(0,0,0,.12),0 0 0 3px rgba(0,0,0,.06)}

/* ===== Count + Sort ===== */
.lg-body{padding-top:32px;padding-bottom:0}
.lg-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;margin-bottom:24px}
.lg-count{font-size:13px;color:var(--ink-3);letter-spacing:-0.26px}
.lg-count b{color:var(--ink);font-weight:600}
.lg-sort{display:flex;align-items:center;gap:6px;width:110px;height:38px;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:0 12px;font-size:13px;font-weight:500;color:var(--ink);cursor:pointer}
.lg-sort select{flex:1;border:0;background:none;outline:0;font:inherit;color:inherit;cursor:pointer;-webkit-appearance:none;appearance:none}

/* ===== Grid ===== */
.lg-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.lg-card{text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:20px;cursor:pointer;display:flex;flex-direction:column;gap:16px;transition:.16s ease;font-family:var(--sans)}
.lg-card:hover{transform:translateY(-3px);box-shadow:0 16px 32px -22px rgba(0,0,0,.45);border-color:#dcdad3}
.lg-cardchip{align-self:flex-start;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:8px;padding:6px 8px;font-size:12px;font-weight:500;letter-spacing:-0.24px}
.lg-card-logo{height:120px;border-radius:16px;display:grid;place-items:center;padding:20px 24px;border:1px solid var(--line);overflow:hidden;background:#fff}
.lg-wordmark{font-weight:800;font-size:19px;letter-spacing:-0.03em;color:var(--brand);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.lg-img{max-width:60%;max-height:44px;object-fit:contain;display:block}
.lg-card-meta{display:flex;flex-direction:column;gap:4px}
.lg-card-ko{font-weight:600;font-size:16px;letter-spacing:-0.48px;color:var(--ink)}
.lg-card-en{font-size:15px;font-weight:500;color:var(--ink-3)}

/* empty */
.lg-empty{text-align:center;padding:80px 0}
.lg-empty-mk{font-size:46px;color:#D6D4CD}
.lg-empty-t{font-weight:700;font-size:20px;margin:10px 0 4px}
.lg-empty-s{color:var(--ink-2);font-size:14px;margin:0}
.lg-reset{margin-top:18px;border:0;background:var(--ink);color:#fff;border-radius:10px;padding:10px 18px;font-weight:600;cursor:pointer}

/* ===== Pagination ===== */
.lg-pager{display:flex;gap:12px;align-items:center;justify-content:center;margin-top:40px}
.lg-pg-btn{width:34px;height:34px;border-radius:1000px;border:1px solid #F3F4F6;background:var(--surface);cursor:pointer;display:grid;place-items:center;color:var(--ink);filter:drop-shadow(0 1px 1px rgba(0,0,0,.04)) drop-shadow(0 2px 2px rgba(0,0,0,.04))}
.lg-pg-btn:disabled{opacity:.35;cursor:default;filter:none}
.lg-pg-num{min-width:36px;height:36px;border:0;background:none;cursor:pointer;border-radius:6px;font-size:15px;font-weight:500;color:var(--ink-3)}
.lg-pg-num.on{color:var(--ink)}
.lg-pg-dots{min-width:24px;text-align:center;color:var(--ink-3);font-size:15px}

/* ===== Footer ===== */
.lg-foot{background:var(--ink);margin-top:96px}
.lg-foot-in{max-width:1200px;margin:0 auto;padding:64px var(--side);display:flex;justify-content:space-between;gap:40px;flex-wrap:wrap}
.lg-foot-l{display:flex;flex-direction:column;gap:34px}
.lg-foot-brand{display:flex;align-items:center;gap:8px}
.lg-foot-logotype{font-family:var(--display);font-weight:700;font-size:22px;letter-spacing:1.1px;color:#fff}
.lg-foot-copy{font-size:13px;color:#fff;opacity:.9;line-height:1.6}
.lg-foot-r{display:flex;flex-direction:column;gap:18px;color:var(--ink-3);font-size:13px;line-height:1.6}
.lg-foot-note{color:#9CA3AF}
.lg-foot-links{display:flex;gap:16px}
.lg-foot-links span{color:#9CA3AF;cursor:pointer}

/* ===== Drawer (로고 상세) ===== */
.lg-overlay{position:fixed;inset:0;z-index:60;background:rgba(20,21,24,.42);backdrop-filter:blur(2px);display:flex;justify-content:flex-end;animation:fade .18s ease}
.lg-drawer{position:relative;width:500px;max-width:100%;height:100%;background:var(--surface);overflow-y:auto;padding:36px 24px;animation:slide .26s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;gap:24px}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes slide{from{transform:translateX(40px);opacity:.4}to{transform:translateX(0);opacity:1}}
@keyframes sheet{from{transform:translateY(60px);opacity:.4}to{transform:translateY(0);opacity:1}}
.lg-d-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
.lg-close{width:40px;height:40px;border-radius:1000px;border:1px solid var(--line);background:var(--surface);cursor:pointer;display:grid;place-items:center;color:var(--ink);font-size:20px;line-height:1;filter:drop-shadow(0 1px 1px rgba(0,0,0,.04)) drop-shadow(0 2px 2px rgba(0,0,0,.04))}
.lg-d-logo{flex:0 0 180px;height:180px;border-radius:16px;border:1px solid var(--line);display:grid;place-items:center;padding:0 40px;overflow:hidden;background:#fff}
.lg-d-img{max-width:60%;max-height:66px;object-fit:contain;display:block}
.lg-d-logo .lg-wordmark{font-size:30px}
.lg-d-head{display:flex;flex-direction:column;gap:8px}
.lg-d-chip{align-self:flex-start;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:8px;padding:6px 8px;font-size:12px;font-weight:500}
.lg-d-name{display:flex;flex-direction:column;gap:4px}
.lg-d-ko{font-size:23px;font-weight:600;letter-spacing:-0.69px;color:var(--ink);margin:0}
.lg-d-en{font-size:15px;font-weight:500;color:var(--ink-3);margin:0}
.lg-d-desc{font-size:15px;font-weight:500;color:var(--ink-3);margin:0;line-height:1.6}
.lg-d-section{display:flex;flex-direction:column;gap:8px}
.lg-d-label{font-size:13px;font-weight:500;color:var(--ink);letter-spacing:-0.26px;margin:0}
.lg-pal{background:var(--fill);border:1px solid var(--line);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:8px}
.lg-pal-item{display:flex;align-items:center;gap:16px;width:100%;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:16px;cursor:pointer;text-align:left;transition:.12s}
.lg-pal-item:hover{border-color:#d3d1ca}
.lg-pal-sw{width:24px;height:24px;border-radius:4px;box-shadow:inset 0 0 0 1px rgba(26,27,29,.1);flex:none}
.lg-pal-name{font-size:16px;font-weight:600;color:var(--ink)}
.lg-pal-hex{margin-left:auto;font-size:15px;color:var(--ink-3)}
.lg-usebox{background:var(--fill);border:1px solid rgba(105,117,134,.08);border-radius:8px;padding:16px;font-size:13px;color:#4B5565;line-height:1.6;letter-spacing:-0.26px}
.lg-cta{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;height:52px;background:var(--ink);color:#fff;border:0;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;text-decoration:none;transition:.15s}
.lg-cta:hover{filter:brightness(1.1)}
.lg-cta-top{display:inline-flex;align-items:center;gap:4px;height:38px;padding:0 12px;background:var(--ink);color:#fff;border:0;border-radius:12px;font-size:13px;font-weight:500;letter-spacing:-0.26px;cursor:pointer;text-decoration:none;transition:.16s ease;white-space:nowrap}
.lg-cta-top:hover{filter:brightness(1.04);transform:translateY(-1px);box-shadow:0 6px 14px -10px rgba(0,0,0,.3)}
.lg-rel{background:var(--fill);border:1px solid var(--line);border-radius:12px;padding:16px}
.lg-rel-row{display:flex;gap:8px}
.lg-rel-item{flex:1 1 0;min-width:0;border:1px solid var(--line);border-radius:12px;height:72px;display:grid;place-items:center;padding:0 12px;cursor:pointer;overflow:hidden;background:linear-gradient(180deg, color-mix(in srgb, var(--brand) 10%, #fff) 0%, #fafafa 49%);transition:.12s}
.lg-rel-item:hover{transform:translateY(-2px)}
.lg-rel-item img{max-width:90%;max-height:36px;object-fit:contain}
.lg-rel-item .lg-wordmark{font-size:13px}

/* 문의 모달 */
.lg-modal-overlay{position:fixed;inset:0;z-index:70;background:rgba(20,21,24,.42);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fade .18s ease}
.lg-modal{width:460px;max-width:100%;background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:0 16px 24px rgba(75,85,101,.1),0 4px 8px rgba(75,85,101,.08);overflow:hidden;animation:pop .2s cubic-bezier(.22,1,.36,1)}
@keyframes pop{from{transform:translateY(10px) scale(.98);opacity:.5}to{transform:none;opacity:1}}
.lg-modal-body{padding:32px;display:flex;flex-direction:column;gap:24px}
.lg-modal-head{display:flex;flex-direction:column;gap:16px}
.lg-modal-title{font-size:17px;font-weight:700;color:var(--ink);margin:0;letter-spacing:-0.51px}
.lg-modal-desc{font-size:15px;color:var(--ink);margin:0;line-height:1.65;letter-spacing:-0.45px}
.lg-modal-email{background:var(--fill);border:1px solid var(--line);border-radius:8px;padding:16px;text-align:center;font-size:16px;font-weight:500;color:var(--ink);word-break:break-all}
.lg-modal-foot{display:flex;gap:8px;align-items:center;justify-content:flex-end;padding:8px 32px 32px}
.lg-modal-close{height:46px;padding:0 24px;border:1px solid var(--line);background:var(--surface);border-radius:12px;font-size:15px;font-weight:500;color:var(--ink);cursor:pointer;box-shadow:0 1px 1px rgba(0,0,0,.04),0 2px 2px rgba(0,0,0,.04)}
.lg-modal-copy{flex:1;height:46px;border:0;background:var(--ink);color:#fff;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:.15s}
.lg-modal-copy:hover{filter:brightness(1.06);transform:translateY(-1px);box-shadow:0 6px 14px -10px rgba(0,0,0,.3)}

/* 댓글 위젯 (우측 하단 플로팅) */
.lg-fab{position:fixed;right:22px;bottom:22px;z-index:60;height:52px;padding:0 22px;display:flex;align-items:center;gap:8px;background:var(--ink);color:#fff;border:0;border-radius:999px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 8px 24px -8px rgba(0,0,0,.4),0 2px 8px rgba(0,0,0,.16);transition:.16s}
.lg-fab:hover{transform:translateY(-2px);box-shadow:0 12px 28px -8px rgba(0,0,0,.45)}
.lg-fab svg{width:20px;height:20px}
.lg-cm-overlay{position:fixed;inset:0;z-index:80;background:rgba(20,21,24,.42);backdrop-filter:blur(2px);display:flex;align-items:flex-end;justify-content:flex-end;padding:22px;animation:fade .18s ease}
.lg-cm{display:flex;flex-direction:column;width:400px;max-width:100%;height:560px;max-height:calc(100vh - 44px);background:var(--surface);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 18px 40px -12px rgba(0,0,0,.32);animation:pop .2s cubic-bezier(.22,1,.36,1)}
.lg-cm-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:20px 20px 14px;border-bottom:1px solid var(--line)}
.lg-cm-title{font-size:16px;font-weight:700;color:var(--ink);margin:0;letter-spacing:-0.02em}
.lg-cm-sub{font-size:12.5px;color:var(--ink-3);margin:4px 0 0;line-height:1.5}
.lg-cm-x{flex:0 0 auto;width:32px;height:32px;border-radius:999px;border:1px solid var(--line);background:var(--surface);color:var(--ink);font-size:16px;line-height:1;cursor:pointer;display:grid;place-items:center}
.lg-cm-list{flex:1;overflow-y:auto;padding:14px 20px;display:flex;flex-direction:column;gap:12px}
.lg-cm-item{display:flex;flex-direction:column;gap:3px}
.lg-cm-meta{display:flex;align-items:center;gap:7px}
.lg-cm-nick{font-size:13px;font-weight:600;color:var(--ink)}
.lg-cm-time{font-size:11.5px;color:var(--ink-3)}
.lg-cm-body{font-size:14px;color:var(--ink-2);line-height:1.55;white-space:pre-wrap;word-break:break-word}
.lg-cm-empty{color:var(--ink-3);font-size:13.5px;text-align:center;padding:30px 0}
.lg-cm-foot{border-top:1px solid var(--line);padding:12px 14px;display:flex;flex-direction:column;gap:8px;background:var(--surface)}
.lg-cm-asyou{font-size:12px;color:var(--ink-3);display:flex;align-items:center;gap:6px}
.lg-cm-asyou b{color:var(--ink-2);font-weight:600}
.lg-cm-reroll{border:0;background:none;color:var(--accent);font-size:12px;cursor:pointer;padding:0;text-decoration:underline}
.lg-cm-inrow{display:flex;gap:8px;align-items:flex-end}
.lg-cm-ta{flex:1;resize:none;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font:inherit;font-size:14px;color:var(--ink);background:var(--fill);min-height:42px;max-height:120px;outline:none}
.lg-cm-ta:focus{border-color:var(--ink-3)}
.lg-cm-send{flex:0 0 auto;height:42px;padding:0 16px;border:0;border-radius:12px;background:var(--ink);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.lg-cm-send:hover{filter:brightness(1.08)}
.lg-cm-send:disabled{opacity:.45;cursor:default}
@media (max-width:520px){
  .lg-cm-overlay{padding:0;align-items:flex-end;justify-content:center}
  .lg-cm{width:100%;height:80vh;max-height:80vh;border-radius:18px 18px 0 0}
  .lg-fab{right:16px;bottom:16px}
}
/* toast */
.lg-toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:90;background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:999px;animation:fade .15s ease}

.lg-seed{text-align:center;font-size:11px;color:#B6B4AD;margin-top:28px}

/* ===== Responsive ===== */
@media(max-width:1024px){ .lg-grid{grid-template-columns:repeat(3,minmax(0,1fr))} }
@media(max-width:760px){
  .lg-root{--side:16px}            /* 모바일 좌우 마진 16px */
  .lg-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .lg-hero{padding:36px var(--side) 22px}
  .lg-card{padding:14px;gap:12px}
  .lg-card-logo{height:96px;padding:14px}
  .lg-wordmark{font-size:16px}
  .lg-img{max-height:32px}
  .lg-logotype,.lg-foot-logotype{font-size:19px}
  .lg-upload{padding:0 12px;font-size:12px;height:34px}
  .lg-upload .full{display:none}
  .lg-upload .short{display:inline}
  .lg-tab{padding:5px 10px}
  .lg-chiprow{flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;width:100%;padding-bottom:4px;-ms-overflow-style:none;scrollbar-width:none}
  .lg-chiprow::-webkit-scrollbar{display:none}
  .lg-colors{flex-wrap:nowrap;overflow-x:auto;width:100%;padding-bottom:4px;justify-content:flex-start;scrollbar-width:none}
  .lg-colors::-webkit-scrollbar{display:none}
  .lg-foot-in{flex-direction:column;gap:28px;padding:40px var(--side)}
  /* drawer → bottom sheet */
  .lg-overlay{align-items:flex-end;justify-content:center}
  .lg-drawer{width:100%;height:auto;max-height:92vh;border-radius:22px 22px 0 0;padding:24px 16px 36px;animation:sheet .28s cubic-bezier(.22,1,.36,1)}
  .lg-d-logo{height:180px}
  .lg-close{width:44px;height:44px;font-size:22px}
  .lg-pg-num{min-width:32px}
}
@media(max-width:380px){
  .lg-hero-title{font-size:18px}
  .lg-d-ko{font-size:21px}
}
</style>
</head>
<body>
<div id="app" class="lg-root"></div>

<script>
/* ===== 설정 ===== */
const BRANDFETCH_CLIENT_ID = "";
const SUPABASE_URL = "https://ttdvoyzzpqufyiaetvxy.supabase.co";
const LOGO_BUCKET = "logos";
const DEFAULT_EXT = "png";
const PAGE_SIZE = 16;
const CONTACT_EMAIL = "logorybusiness@gmail.com";

const brandfetchUrl = (dom) => dom && BRANDFETCH_CLIENT_ID
  ? `https://cdn.brandfetch.io/${dom}/w/400/h/120/logo?c=${BRANDFETCH_CLIENT_ID}` : null;
const isStorageReady = SUPABASE_URL.includes(".supabase.co") && !SUPABASE_URL.includes("YOUR_PROJECT");

const CHO = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
const toCho = (s)=>s.split("").map((ch)=>{const c=ch.charCodeAt(0)-0xac00;return (c>=0&&c<=11171)?CHO[Math.floor(c/588)]:ch;}).join("");
const norm = (v)=> (v==null?"":String(v)).trim().toLowerCase();

function filtered(){
  const needle = state.q.trim().toLowerCase();
  const q = state.q.trim();
  const isChoOnly = q.length>0 && /^[ㄱ-ㅎ]+$/.test(q); // 'ㅋㅋㅇ' 처럼 자음만 입력한 경우
  let arr = LOGOS.filter((l)=>{
    if(state.ind && l.ind!==state.ind) return false;
    if(state.color && norm(l.colorKey)!==norm(state.color)) return false;
    if(!needle) return true;
    if(isChoOnly){ return toCho(l.ko).includes(q); }   // 초성 검색은 자음만 입력했을 때만
    const hay = `${l.ko} ${l.en}`.toLowerCase();
    return hay.includes(needle);                         // 그 외에는 이름 부분일치
  });
  arr.sort((a,b)=>{
    if(state.sort==="popular") return b.pop-a.pop;
    if(state.sort==="newest") return a.added<b.added?1:-1;
    return a.ko.localeCompare(b.ko,"ko");
  });
  return arr;
}

function logoMarkup(logo, variant){
  const chain = sources(logo); SRC_CHAINS[logo.id]=chain;
  const cls = variant==="drawer" ? "lg-d-img" : (variant==="rel" ? "" : "lg-img");
  if(!chain.length) return `<span class="lg-wordmark">${esc(logo.en)}</span>`;
  return `<img class="${cls}" src="${chain[0]}" alt="${esc(logo.en)}" loading="lazy" data-id="${logo.id}" data-idx="0" onerror="logoFail(this)">`;
}
function logoFail(el){
  const chain = SRC_CHAINS[el.dataset.id]||[]; const i=(+el.dataset.idx)+1;
  if(chain[i]){ el.dataset.idx=i; el.src=chain[i]; return; }
  const span=document.createElement("span"); span.className="lg-wordmark"; span.textContent=el.alt; el.replaceWith(span);
}

function pageList(cur, total){
  if(total<=7) return Array.from({length:total},(_,i)=>i+1);
  const out=[1];
  const s=Math.max(2,cur-1), e=Math.min(total-1,cur+1);
  if(s>2) out.push("...");
  for(let i=s;i<=e;i++) out.push(i);
  if(e<total-1) out.push("...");
  out.push(total);
  return out;
}

const NICK_NOUN_KO=["나비","고양이","수달","두더지","참새","여우","펭귄","곰","토끼","너구리","올빼미","청설모","고슴도치","다람쥐","바다표범","무지개","민들레","감자","파도","구름"];
const NICK_ADJ_EN=["Calm","Brave","Curious","Cozy","Witty","Gentle","Swift","Bright","Quiet","Cheery"];
const NICK_NOUN_EN=["Otter","Fox","Penguin","Bear","Rabbit","Owl","Squirrel","Cloud","Wave","Maple"];
function randNick(){
  const ko=state.lang!=="en";
  const A=ko?NICK_ADJ_KO:NICK_ADJ_EN, N=ko?NICK_NOUN_KO:NICK_NOUN_EN;
  return A[Math.floor(Math.random()*A.length)]+" "+N[Math.floor(Math.random()*N.length)];
}
function timeAgo(iso){
  const d=new Date(iso), now=Date.now(), s=Math.floor((now-d.getTime())/1000);
  const ko=state.lang!=="en";
  if(s<60) return ko?"방금":"just now";
  const m=Math.floor(s/60); if(m<60) return ko?`${m}분 전`:`${m}m`;
  const h=Math.floor(m/60); if(h<24) return ko?`${h}시간 전`:`${h}h`;
  const day=Math.floor(h/24); if(day<7) return ko?`${day}일 전`:`${day}d`;
  return d.toLocaleDateString(ko?"ko-KR":"en-US",{month:"short",day:"numeric"});
}

async function loadComments(){
  const list=document.getElementById("cmList"); if(!list) return;
  const t=STR[state.lang];
  try{
    const headers={ "Accept":"application/json","Cache-Control":"no-cache" };
    if(SUPABASE_ANON_KEY){ headers.apikey=SUPABASE_ANON_KEY; headers.Authorization="Bearer "+SUPABASE_ANON_KEY; }
    const res=await fetch(`${SUPABASE_URL}/rest/v1/comments?select=*&order=created_at.desc&limit=100`,{ headers, cache:"no-store" });
    if(!res.ok) throw new Error("HTTP "+res.status);
    const rows=await res.json();
    if(!document.getElementById("cmList")) return;
    if(!rows.length){ list.innerHTML=`<div class="lg-cm-empty">${t.cmEmpty}</div>`; return; }
    list.innerHTML=rows.map(c=>`<div class="lg-cm-item">
      <div class="lg-cm-meta"><span class="lg-cm-nick">${esc(c.nickname)}</span><span class="lg-cm-time">${timeAgo(c.created_at)}</span></div>
      <div class="lg-cm-body">${esc(c.body)}</div></div>`).join("");
  }catch(e){ list.innerHTML=`<div class="lg-cm-empty">${t.cmEmpty}</div>`; }
}
async function postComment(){
  const ta=document.getElementById("cmTa"), btn=document.getElementById("cmSend"); if(!ta||!btn) return;
  const t=STR[state.lang];
  const body=ta.value.trim(); if(!body) return;
  btn.disabled=true;
  try{
    const headers={ "Content-Type":"application/json","Prefer":"return=minimal" };
    if(SUPABASE_ANON_KEY){ headers.apikey=SUPABASE_ANON_KEY; headers.Authorization="Bearer "+SUPABASE_ANON_KEY; }
    const res=await fetch(`${SUPABASE_URL}/rest/v1/comments`,{ method:"POST", headers, body:JSON.stringify({ nickname:CM_NICK, body }) });
    if(!res.ok) throw new Error("HTTP "+res.status);
    ta.value=""; ta.style.height="auto";
    toast(t.cmPosted);
    loadComments();
  }catch(e){ toast(t.cmFail); }
  finally{ btn.disabled=false; }
}

}

      <span class="lg-foot-note">${esc(t.rights).replace(/\n/g,"<br>")}</span>
      <div class="lg-foot-links"><span>개인정보 처리방침</span><span>이용약관</span></div>
    </div>
  </div></footer>

  <div id="drawerRoot"></div>
  <div id="modalRoot"></div>
  <button class="lg-fab" id="cmFab" aria-label="comments"><span id="cmFabLabel">${t.cmFab}</span></button>
  <div id="commentRoot"></div>
  <div id="toastRoot"></div>`;
  wire();
  if(state.active) openDrawer(state.active.id);
}

function wire(){
  document.getElementById("brandBtn").addEventListener("click",resetAll);
  document.getElementById("uploadBtn").addEventListener("click",openContact);
  document.getElementById("cmFab").addEventListener("click",openComments);
  document.getElementById("langKo").addEventListener("click",()=>{ state.lang="ko"; mount(); });
  document.getElementById("langEn").addEventListener("click",()=>{ state.lang="en"; mount(); });
  const search=document.getElementById("searchInput");
  search.addEventListener("input",(e)=>{ state.q=e.target.value; state.page=1; document.getElementById("clearBtn").style.display=state.q?"flex":"none"; refreshGrid(); });
  document.getElementById("clearBtn").addEventListener("click",()=>{ state.q=""; search.value=""; state.page=1; document.getElementById("clearBtn").style.display="none"; search.focus(); refreshGrid(); });
  document.getElementById("chiprow").addEventListener("click",(e)=>{ const b=e.target.closest(".lg-chip"); if(!b)return; if(b.dataset.ind===""){ state.ind=null; } else { const v=b.dataset.ind; state.ind=(state.ind===v)?null:v; } state.page=1; refreshChips(); refreshGrid(); });
  document.getElementById("colors").addEventListener("click",(e)=>{ const b=e.target.closest(".lg-color"); if(!b)return; const v=b.dataset.color; state.color=(state.color===v)?null:v; state.page=1; refreshColors(); refreshGrid(); });
  document.getElementById("sortSel").addEventListener("change",(e)=>{ state.sort=e.target.value; state.page=1; refreshGrid(); });
  const gs=document.getElementById("gridSection");
  gs.addEventListener("click",(e)=>{
    const card=e.target.closest(".lg-card"); if(card){ openDrawer(card.dataset.id); return; }
    const reset=e.target.closest("#resetBtn"); if(reset){ resetAll(); return; }
    const pg=e.target.closest("[data-pg]"); if(pg){
      const v=pg.dataset.pg; const total=Math.max(1,Math.ceil(filtered().length/PAGE_SIZE));
      if(v==="prev") state.page=Math.max(1,state.page-1);
      else if(v==="next") state.page=Math.min(total,state.page+1);
      else state.page=+v;
      refreshGrid(); window.scrollTo({top:document.querySelector(".lg-body").offsetTop-70,behavior:"smooth"});
    }
  });
}
function refreshChips(){ document.querySelectorAll("#chiprow .lg-chip").forEach((b)=>{ const v=b.dataset.ind||null; b.classList.toggle("on", state.ind===v || (!state.ind && v===null)); }); }
function refreshColors(){ document.querySelectorAll("#colors .lg-color").forEach((b)=>b.classList.toggle("on", state.color===b.dataset.color)); }
function resetAll(){ state.q=""; state.ind=null; state.color=null; state.page=1; const s=document.getElementById("searchInput"); if(s)s.value=""; const c=document.getElementById("clearBtn"); if(c)c.style.display="none"; refreshChips(); refreshColors(); refreshGrid(); }

document.addEventListener("keydown",(e)=>{ if(e.key==="Escape"){ const cr=document.getElementById("commentRoot"), mr=document.getElementById("modalRoot"); if(cr&&cr.innerHTML) closeComments(); else if(mr&&mr.innerHTML) closeContact(); else if(state.active) closeDrawer(); } });

function rowToLogo(r){
  return { id:r.id, ko:r.ko, en:r.en, ind:r.ind, colorKey:(r.color_key==null?null:String(r.color_key).trim().toLowerCase()),
    colors:Array.isArray(r.colors)?r.colors:(r.colors?JSON.parse(r.colors):[]),
    desc:r.description||"", year:r.year||undefined, pop:r.pop||0, added:r.added||"",
    url:r.url||"#", src:r.src||"aggregator", usage:r.usage||"guideline", note:r.note||undefined,
    file:r.file||undefined };
}
async function loadCompanies(){
  try{
    const headers = { "Accept":"application/json", "Cache-Control":"no-cache" };
    if(SUPABASE_ANON_KEY){ headers.apikey = SUPABASE_ANON_KEY; headers.Authorization = "Bearer "+SUPABASE_ANON_KEY; }
    const res = await fetch(`${SUPABASE_URL}/rest/v1/companies?select=*&order=pop.desc`, { headers, cache: "no-store" });
    if(!res.ok) throw new Error("HTTP "+res.status);
    const rows = await res.json();
    if(Array.isArray(rows) && rows.length){
      LOGOS = rows.map(rowToLogo);
      rows.forEach(r=>{ if(r.domain) DOMAINS[r.id]=r.domain; });
      state.page=1; mount();
    }
  }catch(e){ /* 폴백: 시드 데이터 그대로 사용 */ }
}

mount();
loadCompanies();
